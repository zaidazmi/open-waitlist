name: Bug Report
description: Report something that is not working as expected.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: How can we reproduce it?
      description: Include steps, environment variables involved, and relevant logs.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Open Waitlist version or commit
    validations:
      required: false
